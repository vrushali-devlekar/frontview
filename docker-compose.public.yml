services:
  traefik:
    image: traefik:v3.1
    container_name: velora-traefik
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.email=${LETSENCRYPT_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_certs:/letsencrypt
    restart: unless-stopped

  velora:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: velora-app
    environment:
      NODE_ENV: production
      PORT: 5000
      BACKEND_URL: https://${PUBLIC_DOMAIN}
      FRONTEND_URL: https://${PUBLIC_DOMAIN}
      CORS_ALLOWED_ORIGINS: https://${PUBLIC_DOMAIN}
      SESSION_COOKIE_SECURE: "true"
      SESSION_COOKIE_SAME_SITE: lax
    env_file:
      - backend/.env.production
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.velora.rule=Host(`${PUBLIC_DOMAIN}`)"
      - "traefik.http.routers.velora.entrypoints=websecure"
      - "traefik.http.routers.velora.tls.certresolver=letsencrypt"
      - "traefik.http.services.velora.loadbalancer.server.port=5000"
    restart: unless-stopped

volumes:
  traefik_certs:
